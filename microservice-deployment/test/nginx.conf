upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream socketio {
    server backend:9000;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;

    # ─── Frontend: /services/lms/frontend/* ─────────────────────
    location /services/lms/frontend/ {
        rewrite ^/services/lms/frontend/(.*) /$1 break;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Backend: /services/lms/backend/* ───────────────────────
    # Gateway injects the mocked user identity header on all backend requests.
    location /services/lms/backend/ {
        rewrite ^/services/lms/backend/(.*) /api/$1 break;

        # Simulated gateway auth — inject static test user header
        proxy_set_header X-User-Id "test-user-uuid-001";

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket support (for socketio, if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Socket.IO: /services/lms/socket.io/* ──────────────────
    location /services/lms/socket.io/ {
        rewrite ^/services/lms/socket.io/(.*) /socket.io/$1 break;

        proxy_pass http://socketio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Root redirect ──────────────────────────────────────────
    location = / {
        return 302 /services/lms/frontend/;
    }
}
