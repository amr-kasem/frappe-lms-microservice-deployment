upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream socketio {
    server backend:9000;
}

# Resolve active user: ?user_id query param > user_id cookie > hardcoded default
map $cookie_user_id $user_from_cookie_or_default {
    ""      "test-user-uuid-001";
    default $cookie_user_id;
}

map $arg_user_id $active_user {
    ""      $user_from_cookie_or_default;
    default $arg_user_id;
}

# Set cookie when ?user_id is present (empty = no header emitted)
map $arg_user_id $set_cookie_header {
    ""      "";
    default "user_id=$arg_user_id; Path=/";
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;

    # Persist user_id into a cookie whenever ?user_id appears on any request
    add_header Set-Cookie $set_cookie_header;

    # ─── Frontend: /services/lms/frontend/* ─────────────────────
    # Switch users: /services/lms/frontend/?user_id=seeder-student-uuid-005
    location /services/lms/frontend/ {
        rewrite ^/services/lms/frontend/(.*) /$1 break;

        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Backend: /services/lms/backend/* ───────────────────────
    # X-User-Id priority: ?user_id query param > user_id cookie > default
    location /services/lms/backend/ {
        rewrite ^/services/lms/backend/(.*) /api/$1 break;

        proxy_set_header X-User-Id $active_user;

        # Strip Frappe session cookies from responses — auth is entirely
        # gateway-driven via X-User-Id; browser must not accumulate a
        # sid=Guest cookie that would override the auth hook on replay.
        proxy_hide_header Set-Cookie;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Socket.IO: /services/lms/socket.io/* ──────────────────
    location /services/lms/socket.io/ {
        rewrite ^/services/lms/socket.io/(.*) /socket.io/$1 break;

        proxy_pass http://socketio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Root redirect ──────────────────────────────────────────
    location = / {
        return 302 /services/lms/frontend/;
    }
}
