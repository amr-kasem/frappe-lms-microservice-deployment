{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lms.fullname" . }}-frontend
spec:
  type: ClusterIP
  selector:
    app: {{ include "lms.fullname" . }}-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 80
{{- end }}
