{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lms.fullname" . }}-frontend
  labels:
    app: {{ include "lms.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "lms.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "lms.fullname" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: app-config
              mountPath: /etc/lms/config.json
              subPath: config.json
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "lms.fullname" . }}-nginx
        - name: app-config
          configMap:
            name: {{ include "lms.fullname" . }}-config
{{- end }}
