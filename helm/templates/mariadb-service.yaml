{{- if .Values.mariadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lms.fullname" . }}-mariadb
spec:
  type: ClusterIP
  selector:
    app: {{ include "lms.fullname" . }}-mariadb
  ports:
    - name: mysql
      port: {{ .Values.mariadb.service.port }}
      targetPort: 3306
{{- end }}
